<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#235f61">
    <title>PhotoCours - Envoyer ses cours</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="title">
        <div class="hero__content">
          <p class="eyebrow">Aide PAP / PPS</p>
          <h1 id="title">PhotoCours</h1>
          <p class="intro">
            Prends en photo tes cours avec ton telephone, verifie les pages, puis partage-les par email pour les imprimer ou les photocopier.
          </p>
        </div>
      </section>

      <section class="tool" aria-label="Outil d'envoi de cours">
        <div class="field-group">
          <label for="email">Email du destinataire</label>
          <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="exemple@email.com">
        </div>

        <div class="field-group">
          <label for="subject">Objet du mail</label>
          <input id="subject" type="text" value="Mes cours a imprimer">
        </div>

        <div class="capture-zone">
          <input id="photos" class="file-input" type="file" accept="image/*" capture="environment" multiple>
          <label class="capture-button" for="photos">
            <span class="capture-button__icon" aria-hidden="true">+</span>
            <span>Prendre ou ajouter des photos</span>
          </label>
          <p class="hint">Tu peux ajouter plusieurs pages avant l'envoi.</p>
        </div>

        <div class="actions">
          <button id="share" class="primary" type="button" disabled>Envoyer par email</button>
          <button id="clear" class="secondary" type="button" disabled>Tout effacer</button>
        </div>

        <p id="status" class="status" role="status">Aucune photo ajoutee pour le moment.</p>
      </section>

      <section class="preview-section" aria-labelledby="preview-title">
        <div class="section-heading">
          <h2 id="preview-title">Pages ajoutees</h2>
          <span id="count" class="count">0</span>
        </div>
        <div id="preview" class="preview-grid"></div>
      </section>
    </main>

    <template id="photo-card-template">
      <article class="photo-card">
        <img alt="">
        <div class="photo-card__bar">
          <span></span>
          <button type="button">Supprimer</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
