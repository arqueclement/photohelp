<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f7a5a">
    <title>PhotoCours</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <div class="hero__copy">
          <p class="eyebrow">Cours vers email</p>
          <h1>PhotoCours</h1>
          <p>
            Prenez une photo d'un cours avec votre telephone, indiquez votre email,
            puis envoyez-la vers votre messagerie pour pouvoir l'imprimer ou la photocopier.
          </p>
        </div>
        <div class="hero__phone" aria-hidden="true">
          <div class="phone">
            <div class="phone__camera"></div>
            <div class="phone__sheet">
              <span></span>
              <span></span>
              <span></span>
              <strong>A4</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="workspace" aria-label="Envoyer une photo de cours">
        <div class="capture-panel">
          <div class="camera-frame">
            <video id="cameraPreview" autoplay playsinline muted hidden></video>
            <canvas id="photoCanvas" hidden></canvas>
            <img id="photoPreview" alt="Apercu de la photo du cours" hidden>
            <div id="emptyState" class="empty-state">
              <span class="camera-icon" aria-hidden="true"></span>
              <p>Ouvrez la camera ou choisissez une photo deja prise.</p>
            </div>
          </div>

          <div class="toolbar" aria-label="Actions photo">
            <button id="startCamera" type="button">Ouvrir camera</button>
            <button id="takePhoto" type="button" disabled>Prendre photo</button>
            <label class="file-button">
              Choisir photo
              <input id="fileInput" type="file" accept="image/*" capture="environment">
            </label>
          </div>
        </div>

        <form id="sendForm" class="send-panel">
          <label>
            Email de reception
            <input id="emailInput" type="email" placeholder="exemple@email.com" required>
          </label>

          <label>
            Nom du cours
            <input id="courseInput" type="text" placeholder="Maths, histoire, SVT...">
          </label>

          <label>
            Message
            <textarea id="messageInput" rows="4">Bonjour, voici la photo de mon cours a imprimer.</textarea>
          </label>

          <div class="actions">
            <button id="downloadPhoto" type="button" disabled>Telecharger</button>
            <button id="printPhoto" type="button" disabled>Imprimer</button>
            <button id="emailPhoto" type="submit" disabled>Envoyer photo</button>
          </div>

          <p id="statusMessage" class="status" role="status">
            Ajoutez une photo pour activer l'envoi.
          </p>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
